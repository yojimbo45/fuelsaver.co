              "@type": "Answer",
              "text": "FuelSaver currently supports real-time fuel price comparison in 26 countries: France, Germany, Croatia, Luxembourg, Portugal, Slovenia, United Kingdom, Spain, Italy, Austria, South Korea, Chile, Australia, Mexico, Brazil, Argentina, Switzerland, Denmark, New Zealand, Netherlands, Belgium, Greece, Malaysia, UAE, South Africa, and India."

          },
          {
            "@type": "Question",
            "name": "What fuel types can I compare?",

          },
          {
            "@type": "Question",
            "name": "How do I find the cheapest gas station near me?",
            "acceptedAnswer": {
